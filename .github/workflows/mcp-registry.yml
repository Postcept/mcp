# Publishes server.json to the official MCP registry. GitHub Actions OIDC from
# this org grants the io.github.postcept namespace directly, so no personal
# membership visibility is involved.
name: Publish to MCP registry

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m).tar.gz" | tar xz mcp-publisher
      - name: Publish
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
